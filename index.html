<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Family Tour Guide</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="header-back" id="header-back" style="display:none">
      ‹ Back
    </button>
    <h1 id="header-title">🗺️ Family Tour Guide</h1>
    <div class="subtitle" id="header-subtitle"></div>
    <button class="lang-toggle" id="lang-toggle" title="Switch Language">
      🇨🇳
    </button>
  </div>

  <!-- Screen: Home -->
  <div class="screen active" id="screen-home">
    <div class="home-hero">
      <div class="logo">✈️</div>
      <h2>Our Trips</h2>
      <p>Audio guides for every place,<br/>so everyone knows the story.</p>
    </div>
    <div class="section-title">Upcoming</div>
    <div id="trip-list"></div>
  </div>

  <!-- Screen: Trip (place list) -->
  <div class="screen" id="screen-trip">
    <div class="section-title">Places</div>
    <div class="places-list" id="places-list"></div>
  </div>

  <!-- Screen: Place detail -->
  <div class="screen" id="screen-place">
    <div class="place-detail" id="place-detail"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
